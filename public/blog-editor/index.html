<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Blog Editor | Intercept Advantage</title>
<!-- editor version 1.1.0 - adds Unpublish button -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet"/>
<style>
:root{--coral:#E8614A;--gold:#F0B942;--ink:#1c1c1c;--cream:#F4F1EC;--dark:#111111;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Barlow',sans-serif;background:var(--cream);color:var(--ink);}
.wrap{max-width:760px;margin:0 auto;padding:40px 24px 100px;}
h1{font-family:'Fraunces',serif;font-size:28px;margin:0 0 32px;}
h2{font-family:'Fraunces',serif;font-size:20px;margin:48px 0 16px;}
label{display:block;font-size:13px;font-weight:600;letter-spacing:.03em;margin:20px 0 6px;}
input,textarea,select{width:100%;font:inherit;font-size:15px;padding:10px 12px;border:1px solid rgba(0,0,0,0.15);border-radius:4px;background:#fff;}
textarea{min-height:160px;resize:vertical;}
.row{display:flex;gap:20px;}
.row > div{flex:1;}
.actions{display:flex;gap:12px;margin-top:28px;}
button{font:inherit;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:12px 24px;border:none;border-radius:4px;cursor:pointer;}
.btn-primary{background:linear-gradient(135deg,var(--coral),var(--gold));color:var(--dark);}
.btn-secondary{background:transparent;border:1px solid rgba(0,0,0,0.2);color:var(--ink);}
table{width:100%;border-collapse:collapse;margin-top:16px;font-size:14px;}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid rgba(0,0,0,0.08);}
th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#777;}
.status-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.status-published{background:rgba(46,160,67,0.15);color:#1a7a33;}
.status-draft{background:rgba(0,0,0,0.08);color:#555;}
.edit-link{color:var(--coral);font-weight:600;cursor:pointer;}
#content-editor{background:#fff;border-radius:0 0 4px 4px;}
#content-editor .ql-editor{min-height:320px;font-size:16px;line-height:1.6;}
.ql-toolbar.ql-snow{border-radius:4px 4px 0 0;background:#f4f1ec;}
#gate{max-width:360px;margin:120px auto;text-align:center;}
#gate input{margin-bottom:16px;}
#msg{margin-top:16px;font-size:14px;}
</style></head>
<body>
<div id="gate">
<h1>Blog Editor</h1>
<label>Password</label>
<input type="password" id="pw"/>
<button class="btn-primary" onclick="unlock()">Enter</button>
<div id="gate-msg" style="color:#c0392b;margin-top:12px;font-size:13px"></div>
</div>

<div id="app" style="display:none">
<div class="wrap">
<h1>Blog Editor <span style="font-size:12px;font-weight:400;color:#999">v1.1.0</span></h1>
<input type="hidden" id="post-id"/>
<label>Article Title</label>
<input id="title"/>
<label>URL Slug</label>
<input id="slug" placeholder="the-best-salespeople-prospect-better"/>
<div class="row">
<div><label>Publication Date</label><input type="date" id="published_date"/></div>
<div><label>Current Status</label><div id="status-pill-display" style="padding:10px 12px">New / Unsaved</div></div>
</div>
<input type="hidden" id="status" value="draft"/>
<label>Card Excerpt</label>
<textarea id="excerpt" style="min-height:80px"></textarea>
<label>Featured Image URL (Dropbox link)</label>
<input id="image_url"/>
<label>Meta Description <span style="font-weight:400;color:#777">(optional, for search/social previews)</span></label>
<textarea id="meta_description" style="min-height:60px"></textarea>
<label>Article Body</label>
<div id="content-editor"></div>
<label style="display:flex;align-items:center;gap:8px;margin-top:24px"><input type="checkbox" id="featured" style="width:auto"/> Featured Article</label>
<div class="actions">
<button class="btn-secondary" onclick="preview()">Preview</button>
<button class="btn-secondary" onclick="save('draft')">Save Draft</button>
<button class="btn-primary" onclick="save('published')">Publish</button>
<button class="btn-secondary" id="unpublish-btn" style="display:none;color:#c0392b;border-color:#c0392b" onclick="save('draft')">Unpublish</button>
<button class="btn-secondary" onclick="resetForm()">New Article</button>
</div>
<div id="msg"></div>

<h2>Existing Articles</h2>
<table>
<thead><tr><th>Title</th><th>Status</th><th>Date</th><th></th></tr></thead>
<tbody id="post-list"></tbody>
</table>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script>
let PW = "";
let posts = [];
const quill = new Quill("#content-editor", {
  theme: "snow",
  modules: { toolbar: [[{ header: [2, 3, false] }], ["bold", "italic", "underline"], [{ list: "ordered" }, { list: "bullet" }], ["blockquote", "link"], ["clean"]] },
});

function unlock() {
  PW = document.getElementById("pw").value;
  fetch("/.netlify/functions/admin-posts", { headers: { "x-editor-password": PW } })
    .then((r) => { if (!r.ok) throw new Error(); return r.json(); })
    .then((data) => {
      posts = data.posts || [];
      sessionStorage.setItem("ia-editor-pw", PW);
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      renderList();
    })
    .catch(() => { document.getElementById("gate-msg").textContent = "Incorrect password."; });
}

(function tryStoredPw() {
  const stored = sessionStorage.getItem("ia-editor-pw");
  if (stored) { document.getElementById("pw").value = stored; unlock(); }
})();

function renderList() {
  const tbody = document.getElementById("post-list");
  tbody.innerHTML = posts.map((p, i) => `<tr>
<td>${p.title}</td>
<td><span class="status-pill status-${p.status}">${p.status}</span></td>
<td>${p.published_date || ""}</td>
<td><span class="edit-link" onclick="editPost(${i})">Edit</span></td>
</tr>`).join("");
}

function editPost(i) {
  const p = posts[i];
  document.getElementById("post-id").value = p.id;
  document.getElementById("title").value = p.title || "";
  document.getElementById("slug").value = p.slug || "";
  document.getElementById("published_date").value = p.published_date || "";
  document.getElementById("status").value = p.status || "draft";
  document.getElementById("status-pill-display").innerHTML = `<span class="status-pill status-${p.status}">${p.status}</span>`;
  document.getElementById("unpublish-btn").style.display = p.status === "published" ? "inline-block" : "none";
  document.getElementById("excerpt").value = p.excerpt || "";
  document.getElementById("image_url").value = p.image_url || "";
  document.getElementById("meta_description").value = p.meta_description || "";
  quill.root.innerHTML = p.content || "";
  document.getElementById("featured").checked = !!p.featured;
  window.scrollTo(0, 0);
}

function resetForm() {
  ["post-id","title","slug","published_date","excerpt","image_url","meta_description"].forEach((id) => document.getElementById(id).value = "");
  quill.root.innerHTML = "";
  document.getElementById("status").value = "draft";
  document.getElementById("status-pill-display").textContent = "New / Unsaved";
  document.getElementById("featured").checked = false;
  document.getElementById("unpublish-btn").style.display = "none";
}

function slugify(s) {
  return s.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

function collect() {
  return {
    id: document.getElementById("post-id").value || undefined,
    title: document.getElementById("title").value,
    slug: document.getElementById("slug").value || slugify(document.getElementById("title").value),
    published_date: document.getElementById("published_date").value || null,
    status: document.getElementById("status").value,
    excerpt: document.getElementById("excerpt").value,
    image_url: document.getElementById("image_url").value,
    meta_description: document.getElementById("meta_description").value,
    content: quill.root.innerHTML,
    featured: document.getElementById("featured").checked,
  };
}

function save(targetStatus) {
  document.getElementById("status").value = targetStatus;
  const body = collect();
  fetch("/.netlify/functions/admin-posts", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-editor-password": PW },
    body: JSON.stringify(body),
  })
    .then((r) => r.json())
    .then((data) => {
      if (data.error) { document.getElementById("msg").textContent = "Error: " + data.error; return; }
      document.getElementById("msg").textContent = targetStatus === "draft" && document.getElementById("post-id").value ? "Saved as draft." : "Saved.";
      document.getElementById("unpublish-btn").style.display = targetStatus === "published" ? "inline-block" : "none";
      return fetch("/.netlify/functions/admin-posts", { headers: { "x-editor-password": PW } }).then((r) => r.json());
    })
    .then((data) => { if (data && data.posts) { posts = data.posts; renderList(); } });
}

function preview() {
  const p = collect();
  const win = window.open("", "_blank");
  win.document.write(`<h1 style="font-family:sans-serif">${p.title}</h1><p style="color:#888">${p.published_date || ""}</p>${p.image_url ? `<img src="${p.image_url}" style="max-width:100%"/>` : ""}<div style="font-family:sans-serif;font-size:18px;line-height:1.7">${p.content}</div>`);
}
</script>
</body></html>
